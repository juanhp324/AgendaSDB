<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="csrf-token" content="{{ csrf_token() }}">
    <title>Acceso Institucional — Agenda Salesiana</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">
    <!-- Theme apply: run before paint to avoid flash -->
    <script>(function(){var t=localStorage.getItem('theme')||'light';document.documentElement.setAttribute('data-theme',t);})();</script>
</head>

<body class="auth-page">

  <!-- Loading overlay -->
  <div id="loginLoadingOverlay" aria-hidden="true">
    <div class="llo-backdrop"></div>
    <div class="llo-card">
      <div class="llo-logo">
        <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
          <polyline points="9 22 9 12 15 12 15 22"/>
        </svg>
      </div>
      <div class="llo-spinner">
        <svg viewBox="0 0 50 50" class="llo-circle">
          <circle cx="25" cy="25" r="20" fill="none" stroke-width="4"/>
        </svg>
      </div>
      <p class="llo-title">Iniciando sesión</p>
      <p class="llo-sub">Verificando credenciales<span class="llo-dots"><span>.</span><span>.</span><span>.</span></span></p>
    </div>
  </div>

  <style>
    #loginLoadingOverlay {
      position: fixed; inset: 0; z-index: 9999;
      display: flex; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none;
      transition: opacity .35s ease;
    }
    #loginLoadingOverlay.visible {
      opacity: 1; pointer-events: all;
    }
    .llo-backdrop {
      position: absolute; inset: 0;
      background: rgba(15, 23, 42, .55);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
    }
    .llo-card {
      position: relative;
      background: rgba(255,255,255,.12);
      border: 1px solid rgba(255,255,255,.22);
      border-radius: 24px;
      padding: 44px 52px;
      text-align: center;
      box-shadow: 0 24px 64px rgba(0,0,0,.25), inset 0 1px 0 rgba(255,255,255,.18);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      transform: translateY(12px);
      transition: transform .4s cubic-bezier(.22,1,.36,1);
    }
    #loginLoadingOverlay.visible .llo-card {
      transform: translateY(0);
    }
    .llo-logo {
      width: 64px; height: 64px;
      border-radius: 18px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 22px;
      box-shadow: 0 8px 24px rgba(102,126,234,.45);
      color: #fff;
    }
    .llo-spinner {
      width: 56px; height: 56px;
      margin: 0 auto 20px;
    }
    .llo-circle {
      width: 100%; height: 100%;
      animation: llo-rotate 1.4s linear infinite;
    }
    .llo-circle circle {
      stroke: url(#lloGrad);
      stroke-dasharray: 100;
      stroke-dashoffset: 60;
      stroke-linecap: round;
      animation: llo-dash 1.4s ease-in-out infinite;
    }
    @keyframes llo-rotate { 100% { transform: rotate(360deg); } }
    @keyframes llo-dash {
      0%   { stroke-dashoffset: 100; }
      50%  { stroke-dashoffset: 20; }
      100% { stroke-dashoffset: 100; }
    }
    .llo-title {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 1.15rem; font-weight: 700;
      color: #fff; margin: 0 0 6px;
      letter-spacing: -.01em;
    }
    .llo-sub {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: .85rem; color: rgba(255,255,255,.65);
      margin: 0;
    }
    .llo-dots span {
      display: inline-block;
      animation: llo-blink 1.4s infinite both;
    }
    .llo-dots span:nth-child(2) { animation-delay: .2s; }
    .llo-dots span:nth-child(3) { animation-delay: .4s; }
    @keyframes llo-blink {
      0%, 80%, 100% { opacity: 0; }
      40%            { opacity: 1; }
    }
  </style>

  <svg width="0" height="0" style="position:absolute">
    <defs>
      <linearGradient id="lloGrad" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#667eea"/>
        <stop offset="100%" stop-color="#764ba2"/>
      </linearGradient>
    </defs>
  </svg>

  <!-- Floating theme toggle for login page -->
  <button id="themeToggle" class="theme-btn theme-btn-float" onclick="toggleTheme()" title="Cambiar tema">
    <svg class="icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/></svg>
    <svg class="icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
  </button>

    <div id="particles-js"></div>

    <div class="auth-wrapper">
        <aside class="auth-side-info">
            <div class="info-content">
                <div class="logo-white">
                    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                        <polyline points="9 22 9 12 15 12 15 22"></polyline>
                    </svg>
                </div>
                <h1>Portal de Enlace</h1>
                <p>Accede al directorio centralizado de institutos y obras. Gestiona la información institucional de manera segura.</p>
            </div>
            <div class="info-footer">
                <p>© 2026 RespawnRD</p>
            </div>
        </aside>

        <main class="auth-side-form">
            <div class="form-container">
                <header class="form-header">
                    <h2>Iniciar Sesión</h2>
                    <p>Introduce tus credenciales para continuar</p>
                </header>

                <div id="errorMsg" class="alert alert-error" style="display:none"></div>

                <div id="recentSessions" class="recent-sessions"></div>

                <form class="main-form" id="loginForm" onsubmit="handleLogin(event)">

                    <div class="input-group">
                        <label for="email">Correo electrónico</label>
                        <div class="input-field">
                            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
                                <polyline points="22,6 12,13 2,6"></polyline>
                            </svg>
                            <input type="email" id="email" name="email" placeholder="usuario@salesianos.org" autocomplete="username" required autofocus>
                        </div>
                    </div>

                    <div class="input-group">
                        <label for="password">Contraseña</label>
                        <div class="input-field">
                            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                                <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                            </svg>
                            <input type="password" id="password" name="password" placeholder="••••••••" autocomplete="current-password">


                            <button type="button" class="btn-toggle-view" id="togglePass">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                    <circle cx="12" cy="12" r="3"></circle>
                                </svg>
                            </button>
                        </div>
                    </div>

                    <div class="form-options">
                        <label class="remember-me">
                            <input type="checkbox" name="remember">
                            <span class="custom-checkbox"></span>
                            <span class="label-text">Recordar sesión</span>
                        </label>
                    </div>

                    <button type="submit" class="btn-submit">
                        <span>Entrar al Sistema</span>
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                            <line x1="5" y1="12" x2="19" y2="12"></line>
                            <polyline points="12 5 19 12 12 19"></polyline>
                        </svg>
                    </button>
                </form>

                <footer class="form-footer">
                    <p>© 2026 RespawnRD</p>
                </footer>
            </div>
        </main>
    </div>

    <script>
        // Funcionalidad para mostrar/ocultar contraseña
        const btn = document.getElementById('togglePass');
        const input = document.getElementById('password');
        btn.addEventListener('click', () => {
            const isPass = input.type === 'password';
            input.type = isPass ? 'text' : 'password';
            btn.style.color = isPass ? 'var(--primary)' : '#9ca3af';
        });
    </script>
    <script src="{{ url_for('static', filename='js/login.js') }}"></script>
    
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script>
      function initParticles() {
        const pjs = document.getElementById('particles-js');
        if(pjs) pjs.innerHTML = '';
        const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
        const color = isDark ? '#ffffff' : '#DC1E46';
        const linecolor = isDark ? '#475569' : '#cbd5e1';
        
        particlesJS('particles-js', {
          "particles": {
            "number": { "value": 30, "density": { "enable": true, "value_area": 1000 } },
            "color": { "value": color },
            "shape": { "type": "circle" },
            "opacity": { "value": 0.7, "random": false },
            "size": { "value": 6, "random": true },
            "line_linked": { "enable": true, "distance": 150, "color": linecolor, "opacity": 0.5, "width": 1.2 },
            "move": { "enable": true, "speed": 1.2, "direction": "none", "random": false, "straight": false, "out_mode": "out", "bounce": false }
          },
          "interactivity": {
            "detect_on": "window",
            "events": { "onhover": { "enable": true, "mode": "grab" }, "onclick": { "enable": false }, "resize": true },
            "modes": { "grab": { "distance": 180, "line_linked": { opacity: 0.6 } } }
          },
          "retina_detect": true
        });
      }
      
      // Initialize after a slight delay to ensure scripts are completely loaded
      setTimeout(initParticles, 100);

      // Listen for theme changes to re-init particles
      const observer = new MutationObserver(mutations => {
        mutations.forEach(mutation => {
          if (mutation.attributeName === 'data-theme') {
            initParticles();
          }
        });
      });
      observer.observe(document.documentElement, { attributes: true });
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>
    <script src="{{ url_for('static', filename='js/tactile.js') }}"></script>
</body>

</html>
