name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit-integration:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:6
        ports: ["27017:27017"]
      redis:
        image: redis:7
        ports: ["6379:6379"]

    env:
      SECRET_KEY: ci_test_secret_key
      MONGODB_URI: mongodb://localhost:27017/?directConnection=true
      DATABASE_NAME: AgendaSDB_test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run unit & integration tests
        run: pytest tests/ -v

  e2e:
    name: E2E Browser Tests
    runs-on: ubuntu-latest
    needs: unit-integration  # Solo corre si los unit tests pasan

    services:
      mongodb:
        image: mongo:6
        ports: ["27017:27017"]
      redis:
        image: redis:7
        ports: ["6379:6379"]

    env:
      SECRET_KEY: ci_test_secret_key
      MONGODB_URI: mongodb://localhost:27017/?directConnection=true
      DATABASE_NAME: AgendaSDB_test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browsers
        run: python -m playwright install chromium --with-deps

      - name: Run E2E tests
        run: pytest tests/test_e2e.py -v
