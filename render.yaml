services:
  - type: web
    name: agenda-sdb
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn app:app"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: MONGODB_URI
        sync: false
      - key: DATABASE_NAME
        value: AgendaSDB
      - key: SECRET_KEY
        generateValue: true
      - key: REDIS_URL
        sync: false
      - key: FLASK_ENV
        value: production
