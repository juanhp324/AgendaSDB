[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    --verbose
    --tb=short
    --cov=app
    --cov=domain
    --cov=infrastructure/core
    --cov=infrastructure/db.py
    --cov=infrastructure/model/MAuth.py
    --cov-report=html
    --cov-report=term-missing
    --cov-fail-under=70
markers =
    e2e: end-to-end browser tests (require the server running and --ignore override)
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
